<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Freelancer Page Capture — Options</title>
    <style>
      body { font: 14px system-ui; padding: 24px; max-width: 480px; }
      label { display: block; margin: 16px 0 4px; font-weight: 600; }
      input { width: 100%; padding: 8px; box-sizing: border-box; }
      button { margin-top: 16px; padding: 8px 16px; }
      #status { margin-top: 12px; color: #0a0; }
    </style>
  </head>
  <body>
    <h1>Freelancer Page Capture</h1>
    <label for="apiBaseUrl">API base URL</label>
    <input id="apiBaseUrl" placeholder="https://crawler.example.com" />
    <label for="token">Ingest token</label>
    <input id="token" type="password" placeholder="INGEST_TOKEN value" />
    <button id="save">Save</button>
    <div id="status"></div>
    <h2>Last run</h2>
    <pre id="lastRun" style="background:#f4f4f4;padding:12px;overflow-x:auto;font-size:12px">Never run.</pre>
    <script type="module" src="options.js"></script>
  </body>
</html>
