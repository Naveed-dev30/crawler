# Docker Compose for the "crawler" Laravel 10 app.
# App image is built from the existing Laravel Sail runtime in ./docker/8.2 (PHP 8.2).
services:
  laravel.test:
    build:
      # Small build context (just the Dockerfile + php.ini/supervisord) — keeps the
      # 84MB db.sql out of the image build.
      context: ./docker/8.2
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP:-1000}'
    image: crawler-app
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8000}:80'
    environment:
      WWWUSER: '${WWWUSER:-1000}'
      LARAVEL_SAIL: 1
    volumes:
      - '.:/var/www/html'
    # First boot: install PHP deps if vendor/ is missing, then serve on :80.
    # (vendor/ is git-ignored, so it won't exist on a fresh clone.)
    # Scheduling lives in the dedicated 'scheduler' service below.
    command:
      - bash
      - -c
      - |
        if [ ! -d vendor ]; then composer install --no-interaction --prefer-dist --optimize-autoloader; fi
        # Normalize ownership so the sail (uid 1000) process can always write logs/cache.
        # Self-heals root-owned files that would otherwise crash logging (see logging.php).
        chown -R sail:sail storage bootstrap/cache || true
        php artisan serve --host=0.0.0.0 --port=80
    networks:
      - crawler
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    image: crawler-app
    restart: unless-stopped
    environment:
      WWWUSER: '${WWWUSER:-1000}'
      LARAVEL_SAIL: 1
    volumes:
      - '.:/var/www/html'
    # schedule:work is minute-aligned (no drift), unlike a sleep-60 loop, so
    # everyThirtyMinutes tasks (bid award check) fire reliably at :00/:30.
    # Waits for vendor/ because laravel.test installs it on first boot.
    command:
      - bash
      - -c
      - |
        until [ -d vendor ]; do sleep 5; done
        php artisan schedule:work
    networks:
      - crawler
    depends_on:
      laravel.test:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue-worker:
    image: crawler-app
    restart: unless-stopped
    environment:
      WWWUSER: '${WWWUSER:-1000}'
      LARAVEL_SAIL: 1
    volumes:
      - '.:/var/www/html'
    # Drains the database queue (OpenAI matching, FCM pushes). --max-time
    # recycles the worker hourly so restarts pick up new code.
    command:
      - bash
      - -c
      - |
        until [ -d vendor ]; do sleep 5; done
        php artisan queue:work --tries=3 --backoff=10 --sleep=3 --max-time=3600
    networks:
      - crawler
    depends_on:
      laravel.test:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  thread-sync:
    image: crawler-app
    restart: unless-stopped
    environment:
      WWWUSER: '${WWWUSER:-1000}'
      LARAVEL_SAIL: 1
    volumes:
      - '.:/var/www/html'
    # 10-second Freelancer thread/message sync loop (threads:sync).
    command:
      - bash
      - -c
      - |
        until [ -d vendor ]; do sleep 5; done
        php artisan threads:sync
    networks:
      - crawler
    depends_on:
      laravel.test:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: 'mysql:8.0'
    restart: unless-stopped
    ports:
      # Loopback-only: MySQL must NOT be reachable from the public internet.
      # The app connects over the internal 'crawler' Docker network, not this port.
      - '127.0.0.1:${FORWARD_DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-password}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE:-crawler}'
      MYSQL_USER: '${DB_USERNAME:-sail}'
      MYSQL_PASSWORD: '${DB_PASSWORD:-password}'
    volumes:
      - 'crawler-mysql:/var/lib/mysql'
      # Auto-imports the dump into ${DB_DATABASE} on FIRST init (empty volume only).
      # The dump has no CREATE DATABASE/USE, so the mysql entrypoint loads it into
      # MYSQL_DATABASE. To re-import, run: docker compose down -v.
      - './db.sql:/docker-entrypoint-initdb.d/db.sql:ro'
    networks:
      - crawler
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-p${DB_PASSWORD:-password}']
      retries: 5
      timeout: 5s
      start_period: 60s

  redis:
    image: 'redis:alpine'
    restart: unless-stopped
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - 'crawler-redis:/data'
    networks:
      - crawler
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      retries: 3
      timeout: 5s

  soketi:
    image: 'quay.io/soketi/soketi:latest-16-alpine'
    restart: unless-stopped
    ports:
      - '${FORWARD_SOKETI_PORT:-6001}:6001'
    environment:
      SOKETI_DEFAULT_APP_ID: '${PUSHER_APP_ID:-crawler}'
      SOKETI_DEFAULT_APP_KEY: '${PUSHER_APP_KEY:-crawler-key}'
      SOKETI_DEFAULT_APP_SECRET: '${PUSHER_APP_SECRET:-crawler-secret}'
    networks:
      - crawler

  mailpit:
    image: 'axllent/mailpit:latest'
    restart: unless-stopped
    ports:
      - '${FORWARD_MAILPIT_PORT:-1025}:1025'
      - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
    networks:
      - crawler

networks:
  crawler:
    driver: bridge

volumes:
  crawler-mysql:
    driver: local
  crawler-redis:
    driver: local
